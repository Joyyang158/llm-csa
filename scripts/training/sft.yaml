# SFT for the CSA model. Full-parameter fine-tuning.

# ---- Model & data ----
model_name: path/to/checkpoint-or-hf-id
model_type: qwen
dataset_name: your-username/csa-sft-dataset
domain: math                     # 'math' or 'science'
sft_mode: label                  # 'label', 'teacher', or 'self'

# ---- Output ----
base_output_dir: outputs/sft/math/label/your-model-name

# ---- Optimisation ----
per_device_train_batch_size: 8
gradient_accumulation_steps: 1
epochs: 3
learning_rate: 1.0e-5
mixed_precision: bf16
optim: adamw_torch
weight_decay: 0.01
lr_scheduler_type: cosine
warmup_ratio: 0.1
seed: 3407

# ---- Logging & checkpointing ----
logging_strategy: steps
logging_steps: 1
save_strategy: steps
save_steps: 200
save_total_limit: 5
save_only_model: true

# ---- TRL-specific ----
dataset_text_field: text
dataset_num_proc: 4
max_seq_length: 5000
completion_only_loss: true

# ---- W&B ----
wandb_project: capability-self-assessment
report_to: wandb
